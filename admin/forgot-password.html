<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>АкваБлеск — Сброс доступа</title>
  <meta name="robots" content="noindex,nofollow">
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
  <link rel="icon" type="image/png" sizes="16x16" href="../favicon-16x16.png">
  <link rel="icon" type="image/png" sizes="32x32" href="../favicon-32x32.png">
  <link rel="icon" type="image/x-icon" href="../favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="../apple-touch-icon.png">
  <link rel="manifest" href="../site.webmanifest">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="admin-shell">
    <main class="page-shell">
      <section class="panel-card page-card auth-card">
        <p class="eyebrow">Восстановление доступа</p>
        <h1>Забыли пароль?</h1>
        <p class="lead">Введите e-mail администратора. Если он найден, на него будет отправлена ссылка для сброса логина и пароля.</p>
        <form class="stack" data-forgot-form>
          <label><span>E-mail</span><input type="email" name="email" autocomplete="email" required></label>
          <button class="button primary" type="submit">Отправить ссылку</button>
          <p class="status" data-forgot-status></p>
        </form>
        <div class="auth-links">
          <a href="./index.html">Назад ко входу</a>
        </div>
      </section>
    </main>

    <footer class="admin-footer">
      <div class="admin-footer__inner">
        <span>© АкваБлеск 2026</span>
        <span>Digital product by BladislavKhan</span>
      </div>
    </footer>
  </div>

  <script src="./forgot-password.js"></script>
</body>
</html>

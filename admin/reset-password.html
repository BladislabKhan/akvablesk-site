<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>АкваБлеск — Новый доступ</title>
  <meta name="robots" content="noindex,nofollow">
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
  <link rel="icon" type="image/png" sizes="16x16" href="../favicon-16x16.png">
  <link rel="icon" type="image/png" sizes="32x32" href="../favicon-32x32.png">
  <link rel="icon" type="image/x-icon" href="../favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="../apple-touch-icon.png">
  <link rel="manifest" href="../site.webmanifest">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="admin-shell">
    <main class="page-shell">
      <section class="panel-card page-card auth-card">
        <p class="eyebrow">Сброс доступа</p>
        <h1>Новые логин и пароль</h1>
        <p class="lead">Укажите новый логин и новый пароль для входа в админку.</p>
        <form class="stack" data-reset-form>
          <label><span>Новый логин</span><input type="text" name="username" required></label>
          <label><span>Новый пароль</span><input type="password" name="newPassword" minlength="8" autocomplete="new-password" required></label>
          <button class="button primary" type="submit">Обновить доступ</button>
          <p class="status" data-reset-status></p>
        </form>
        <div class="auth-links">
          <a href="./index.html">Вернуться ко входу</a>
        </div>
      </section>
    </main>

    <footer class="admin-footer">
      <div class="admin-footer__inner">
        <span>© АкваБлеск 2026</span>
        <span>Digital product by BladislavKhan</span>
      </div>
    </footer>
  </div>

  <script src="./reset-password.js"></script>
</body>
</html>
